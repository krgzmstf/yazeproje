# ──────────────────────────────────────────────────────────────
# YAZE Proje – Docker Compose Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────────────────────
version: "3.9"

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    restart: always

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DEBUG: "false"
      ENVIRONMENT: production
      USE_SQLITE: "false"
      POSTGRES_HOST: postgres
      POSTGRES_USER: yaze_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: yaze_db
      REDIS_HOST: redis
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 1002
      --workers 4
      --no-access-log
    volumes:
      - backend_uploads:/app/uploads
    restart: always

  frontend:
    # Hosted on Vercel, not run on the server
    image: alpine
    entrypoint: ["echo", "Frontend is hosted on Vercel"]
    restart: "no"

  lead-system:
    image: python:3.11-slim
    container_name: yaze-lead-system
    restart: unless-stopped
    working_dir: /app
    volumes:
      - /app/lead-system:/app
    command: sh -c "pip install -r requirements.txt -q && python app.py"
    environment:
      FLASK_ENV: production
    networks:
      - yaze-network

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
      - backend_uploads:/app/uploads:ro
    depends_on:
      - backend
      - lead-system
    restart: always

  # ── Certbot (Let's Encrypt) ────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: yaze-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "certbot certonly --webroot -w /var/www/certbot --email ercang@yazeproje.com --agree-tos --no-eff-email --non-interactive -d api.yazeproje.com && trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    depends_on:
      - nginx

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  certbot_webroot:
