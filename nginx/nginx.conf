# ──────────────────────────────────────────────────────────────
# YAZE Proje – Nginx Reverse Proxy Configuration
# ──────────────────────────────────────────────────────────────

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Upstream Backends ────────────────────────────────────
    upstream backend_api {
        server backend:1002;
    }

    upstream frontend_app {
        server frontend:1001;
    }

    # ── HTTP → HTTPS Redirect (production) ───────────────────
    server {
        listen 80;
        server_name yazeproje.com www.yazeproje.com;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # In development, serve traffic directly; in production, redirect
        location / {
            # Uncomment for production HTTPS redirect:
            # return 301 https://$host$request_uri;

            # Development: proxy to frontend
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API proxy
        location /api/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Swagger / docs proxy
        location /docs {
            proxy_pass http://backend_api/docs;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://backend_api/redoc;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://backend_api/openapi.json;
            proxy_set_header Host $host;
        }
    }

