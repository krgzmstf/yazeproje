version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: yazesym_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-yazesym}
      POSTGRES_USER: ${DB_USER:-yazesym_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-yazesym_user} -d ${DB_NAME:-yazesym}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yazesym_net

  # ─── Backend (FastAPI) ────────────────────────────────────────
  backend:
    image: yazesym-backend:latest
    container_name: yazesym_backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-yazesym_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-yazesym}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      APP_BASE_URL: https://yazesym.yazeproje.com
      IYZICO_API_KEY: ${IYZICO_API_KEY:-}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY:-}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL:-https://api.iyzipay.com}
      SMTP_SUNUCU: ${SMTP_SUNUCU:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_KULLANICI: ${SMTP_KULLANICI}
      SMTP_SIFRE: ${SMTP_SIFRE}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-YAZESYM}
      WHATSAPP_URL: http://whatsapp:3001
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - yazesym_net

  # ─── WhatsApp Servisi ────────────────────────────────────────
  whatsapp:
    image: yazesym-whatsapp:latest
    container_name: yazesym_whatsapp
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - whatsapp_auth:/app/baileys_auth
    networks:
      - yazesym_net

volumes:
  postgres_data:
  whatsapp_auth:

networks:
  yazesym_net:
    name: yazesym_network
