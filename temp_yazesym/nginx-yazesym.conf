# /etc/nginx/sites-available/yazesym.yazeproje.com

server {
    listen 80;
    server_name yazesym.yazeproje.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yazesym.yazeproje.com;

    # SSL - Certbot bu satırları otomatik doldurur
    ssl_certificate /etc/letsencrypt/live/yazesym.yazeproje.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yazesym.yazeproje.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Dosya yükleme limiti
    client_max_body_size 20M;

    # ─── API (Backend FastAPI) ────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 10;
    }

    # ─── API Docs ─────────────────────────────────────────────
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # ─── Frontend (Vercel'den gelir, burada bir şey yok) ─────
    # Frontend ayrıca Vercel'de: https://yazesym.vercel.app
    # CORS ayarı backend'de yapılmalı

    # ─── 404 fallback ─────────────────────────────────────────
    location / {
        return 404 "YazeSYM API Sunucusu";
    }
}
